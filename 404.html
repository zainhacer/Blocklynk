<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blocklynk</title>
  <script>
    var p = new URLSearchParams(window.location.search).get('p');
    if (!p) {
      sessionStorage.setItem('ghpages_redirect', window.location.pathname);
      window.location.replace(
        window.location.origin +
        window.location.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(window.location.pathname.slice(1)) +
        window.location.hash
      );
    }
  </script>
</head>
<body></body>
</html>
